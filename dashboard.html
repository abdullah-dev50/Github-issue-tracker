<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <!-- NAVBAR -->

<div class="navbar bg-white shadow px-6">

<div class="flex-1 text-xl font-bold">
GitHub Issues
</div>

<div class="flex gap-3 items-center">

<input
id="searchInput"
type="text"
placeholder="Search issues..."
class="input input-bordered bg-white"
/>

<button
class="flex items-center gap-2 bg-blue-700 text-white px-4 py-2 rounded-md hover:bg-blue-800 transition">

<svg xmlns="http://www.w3.org/2000/svg"
width="18"
height="18"
fill="none"
stroke="currentColor"
stroke-width="2"
viewBox="0 0 24 24">

<line x1="12" y1="5" x2="12" y2="19"></line>
<line x1="5" y1="12" x2="19" y2="12"></line>

</svg>

New Issue

</button>
    
</body>
</html>

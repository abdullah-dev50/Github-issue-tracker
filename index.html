<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white shadow-lg rounded-xl w-96 p-8 text-center">

<img src="https://cdn-icons-png.flaticon.com/512/25/25231.png"
class="w-16 mx-auto mb-4">

<h2 class="text-2xl font-bold mb-2">
GitHub Issues Tracker
</h2>

<p class="text-gray-500 mb-6">
Sign in to manage issues
</p>

<input
id="username"
type="text"
placeholder="Username"
class="input input-bordered w-full mb-4 bg-white"
/>

<input
id="password"
type="password"
placeholder="Password"
class="input input-bordered w-full mb-4 bg-white"
/>

<button
onclick="login()"
class="btn w-full bg-blue-700 text-white hover:bg-blue-800">
Sign In
</button>

<p class="text-sm text-gray-500 mt-4">
Demo: admin / admin123
</p>

</div>
    
</body>
</html>
